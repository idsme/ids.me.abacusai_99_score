<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130">
  <defs>
    <style>
      .text-main { fill: #454545; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      .text-tagline { fill: #454545; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      .blue-dark { fill: #1f7099; }
      .blue-light { fill: #219bd9; }
      .white-fill { fill: #ffffff; }
    </style>
  </defs>

  <!-- Flask + Cloud group scaled 1.15x with padding -->
  <g transform="translate(4, 2) scale(1.15)">
    <!-- Flask body - symmetric around center x=33, 20% wider -->
    <path class="blue-light" d="
      M33,118
      L3,118 C1,118 0,116 1,114
      L24,70 L24,52
      L20,52 L20,48 L46,48 L46,52 L42,52
      L42,70 L65,114 C66,116 65,118 63,118
      Z" />

    <!-- Flask neck -->
    <rect class="blue-light" x="27" y="42" width="12" height="12" rx="1" />

    <!-- Flask liquid highlight - symmetric -->
    <path class="blue-dark" d="M11,103 L55,103 L42,80 L24,80 Z" opacity="0.3" />

    <!-- Flask rim -->
    <rect class="blue-dark" x="20" y="42" width="26" height="4" rx="2" />

    <!-- White bubbles inside flask -->
    <circle class="white-fill" cx="25" cy="96" r="3" opacity="0.8" />
    <circle class="white-fill" cx="33" cy="89" r="2" opacity="0.7" />
    <circle class="white-fill" cx="41" cy="98" r="2.5" opacity="0.6" />

    <!-- Small bubbles rising from flask neck into cloud -->
    <circle class="blue-dark" cx="31" cy="40" r="2" opacity="0.5" />
    <circle class="blue-dark" cx="35" cy="37" r="2.5" opacity="0.6" />
    <circle class="blue-dark" cx="29" cy="34" r="3" opacity="0.7" />

    <!-- Cloud - billowing upward from flask opening (5% wider) -->
    <ellipse class="blue-dark" cx="33" cy="32" rx="14.7" ry="8.4" />
    <circle class="blue-dark" cx="27" cy="24" r="10.5" />
    <circle class="blue-dark" cx="41" cy="22" r="11.55" />
    <circle class="blue-dark" cx="33" cy="16" r="9.45" />
    <circle class="blue-dark" cx="23" cy="16" r="7.35" />
    <circle class="blue-dark" cx="49" cy="18" r="8.4" />
    <circle class="blue-dark" cx="55" cy="26" r="5.25" />
    <circle class="blue-dark" cx="35" cy="9" r="6.3" />
    <circle class="blue-dark" cx="45" cy="12" r="5.25" />
    <circle class="blue-dark" cx="17" cy="20" r="5.25" />

    <!-- White highlights in cloud (30% bigger) -->
    <circle class="white-fill" cx="25" cy="20" r="3.9" opacity="0.25" />
    <circle class="white-fill" cx="41" cy="16" r="3.25" opacity="0.2" />
    <circle class="white-fill" cx="33" cy="12" r="2.6" opacity="0.2" />
  </g>

  <!-- Text: "Lets Create Something" -->
  <text class="text-tagline" x="80" y="46" font-size="11" font-weight="400" letter-spacing="0.5">Lets Create Something</text>

  <!-- Text: "ACME LABS" -->
  <text class="text-main" x="78" y="90" font-size="42" font-weight="700" letter-spacing="2">ACME L<tspan font-size="36">A</tspan>BS</text>

  <!-- Text: "Out of Nothing" -->
  <text class="text-tagline" x="130" y="112" font-size="11" font-weight="400" letter-spacing="0.5">Out of Nothing</text>
</svg>
