server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript text/markdown
               application/json application/javascript application/xml
               application/rss+xml application/atom+xml
               image/svg+xml font/woff2;

    # ---------------------------------------------------------------------------
    # Security headers (ported from vercel.json)
    # ---------------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https://idsme.dev https://platform.twitter.com https://syndication.twitter.com https://player.vimeo.com https://vimeo.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://idsme.dev https://platform.twitter.com https://cdn.syndication.twimg.com https://player.vimeo.com; style-src 'self' 'unsafe-inline' https://idsme.dev https://platform.twitter.com; img-src 'self' data: https: blob: https://ghchart.rshah.org; font-src 'self' https://idsme.dev; connect-src 'self' https://idsme.dev https://platform.twitter.com https://player.vimeo.com https://vimeo.com; media-src 'self' https://idsme.dev https://player.vimeo.com https://vimeo.com; object-src 'none'; frame-ancestors 'none'; frame-src https://platform.twitter.com https://syndication.twitter.com https://player.vimeo.com https://www.youtube.com https://youtube.com https://*.youtube.com https://www.youtube-nocookie.com https://*.youtube-nocookie.com; worker-src 'self' blob:" always;

    # ---------------------------------------------------------------------------
    # Content negotiation: serve .md when Accept: text/markdown
    # Astro builds these as static files (e.g. /index.md, /about.md, /posts/hello-world.md)
    # ---------------------------------------------------------------------------

    # Root: /  → /index.md
    location = / {
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /index.md last;
        }
        try_files /index.html =404;
    }

    # /about, /archives, /posts  → /$1.md
    location ~ ^/(about|archives|posts)$ {
        add_header Vary "Accept" always;
        if ($http_accept ~* "text/markdown") {
            rewrite ^/(.+)$ /$1.md last;
        }
        try_files $uri $uri/index.html $uri.html =404;
    }

    # /posts/<slug>  → /posts/<slug>.md
    location ~ ^/posts/(.+)$ {
        add_header Vary "Accept" always;
        if ($http_accept ~* "text/markdown") {
            rewrite ^(/posts/.+)$ $1.md last;
        }
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Serve .md files with correct content type + Vary header
    location ~ \.md$ {
        add_header Vary "Accept" always;
        types { text/markdown md; }
        default_type text/markdown;
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Redirects (ported from vercel.json)
    # ---------------------------------------------------------------------------

    # .md files on idsme.dev → idsme.md (when NOT requesting text/markdown)
    # Note: this redirect only applied on idsme.dev host in Vercel; replicate if needed
    # location ~ ^/(.+)\.md$ {
    #     if ($http_accept !~* "text/markdown") {
    #         return 302 https://idsme.md/$1;
    #     }
    # }

    # Legacy: /YYYY/MM/DD/slug → /posts/slug
    location ~ "^/\d{4}/\d{2}/\d{2}/(.+)$" {
        return 301 /posts/$1;
    }

    # Legacy: /blog/YYYY/MM/DD/slug → /posts/slug
    location ~ "^/blog/\d{4}/\d{2}/\d{2}/(.+)$" {
        return 301 /posts/$1;
    }

    # Legacy: /blog/slug → /posts/slug
    location ~ "^/blog/([^/]+)$" {
        return 301 /posts/$1;
    }

    # Legacy: /categories/X → /tags/X
    location ~ "^/categories/(.+)$" {
        return 301 /tags/$1;
    }

    # Legacy: /tag/X → /tags/X
    location ~ "^/tag/(.+)$" {
        return 301 /tags/$1;
    }

    # ---------------------------------------------------------------------------
    # Static assets caching
    # ---------------------------------------------------------------------------

    # Long cache for hashed assets (Astro _astro/ directory)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fonts
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images and media
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|mp3)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker — never cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------------------------------------------------------------------------
    # Default: serve static files (trailingSlash: false)
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
